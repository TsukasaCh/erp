# ============================================================================
# Alucurv ERP — nginx reverse proxy config
# ============================================================================
# Pasang di server reverse proxy (mis. 172.16.0.102).
# Backend ERP ada di 172.16.0.62 (web port 3001, API port 3000).
#
# Request flow:
#   browser → http://172.16.0.102/                  → web (172.16.0.62:3001)
#   browser → http://172.16.0.102/api/auth/login    → api (172.16.0.62:3000)
#   browser → http://172.16.0.102/health            → api (172.16.0.62:3000)
#   browser → http://172.16.0.102/_next/...         → web (172.16.0.62:3001)
#
# CATATAN PENTING: setelah pasang config ini, lo HARUS rebuild web container
# di backend ERP dengan NEXT_PUBLIC_API_BASE=http://172.16.0.102 supaya
# fetch dari frontend ke API lewat nginx (bukan langsung ke 172.16.0.62:3000).
# Detail di nginx/README.md.
#
# Pasang:
#   sudo cp alucurv-erp.conf /etc/nginx/sites-available/alucurv-erp
#   sudo ln -sf /etc/nginx/sites-available/alucurv-erp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# Upstream definitions — ganti IP/port sesuai setup lo
upstream alucurv_web {
    server 172.16.0.62:3001;
    keepalive 32;
}

upstream alucurv_api {
    server 172.16.0.62:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    # Domain + IP fallback (akses via IP juga jalan)
    server_name alucurv.ngelinx.com 172.16.0.102 _;

    # ----- Logging -----
    access_log /var/log/nginx/alucurv-erp.access.log;
    error_log  /var/log/nginx/alucurv-erp.error.log;

    # ----- Limits -----
    client_max_body_size 16M;       # naikin kalau butuh upload file gede
    client_body_timeout 60s;
    send_timeout 60s;

    # ----- Gzip -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ========================================================================
    # API endpoints — proxy ke backend Express
    # ========================================================================
    # Semua /api/* dan /health di-route ke API container
    location /api/ {
        proxy_pass http://alucurv_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Timeout: API call biasanya cepat tapi seed/batch bisa lama
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Buffering off untuk JSON responses kecil (lebih cepat TTFB)
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://alucurv_api;
        proxy_set_header Host $host;
        access_log off;     # health checks gak usah dilog
    }

    # ========================================================================
    # Next.js web — semua route lain
    # ========================================================================
    # Static assets Next.js (JS/CSS chunks): cache lama, immutable
    location /_next/static/ {
        proxy_pass http://alucurv_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";

        # Next.js static chunks pakai content-hash di filename, aman di-cache lama
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public assets (logo, favicon, dst di /public Next.js)
    location ~* ^/(logo\.svg|icon\.svg|favicon\.ico|robots\.txt) {
        proxy_pass http://alucurv_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Sisanya: HTML + dynamic Next.js routes
    location / {
        proxy_pass http://alucurv_web;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Next.js HMR (kalau dev) butuh ws upgrade — aman di prod juga
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
