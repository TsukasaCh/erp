# ============================================================================
# Alucurv ERP — nginx config dengan HTTPS via Let's Encrypt
# ============================================================================
# Versi production dengan domain + SSL. Pakai ini kalau sudah punya domain
# (mis. alucurv.ngelinx.com) dan udah jalanin certbot.
#
# Setup awal:
#   1. Pastikan DNS A-record domain → IP reverse proxy (172.16.0.102 atau public IP)
#   2. Install certbot:
#      sudo apt install certbot python3-certbot-nginx
#   3. Run certbot dgn config http-only dulu:
#      sudo cp alucurv-erp.conf /etc/nginx/sites-available/alucurv-erp
#      sudo ln -sf /etc/nginx/sites-available/alucurv-erp /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#      sudo certbot --nginx -d alucurv.ngelinx.com -m admin@ngelinx.com --agree-tos
#   4. Certbot otomatis edit config jadi mirip file ini.
#      Atau replace manual dgn config ini setelah cert udah ada.
# ============================================================================

upstream alucurv_web { server 172.16.0.62:3001; keepalive 32; }
upstream alucurv_api { server 172.16.0.62:3000; keepalive 32; }

# HTTP → redirect ke HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name alucurv.ngelinx.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name alucurv.ngelinx.com;

    # ----- SSL (path standar Let's Encrypt) -----
    ssl_certificate     /etc/letsencrypt/live/alucurv.ngelinx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alucurv.ngelinx.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/alucurv.ngelinx.com/chain.pem;

    # Modern TLS config (Mozilla intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ----- Security headers -----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----- Logging -----
    access_log /var/log/nginx/alucurv-erp.access.log;
    error_log  /var/log/nginx/alucurv-erp.error.log;

    # ----- Limits + gzip (sama dgn HTTP version) -----
    client_max_body_size 16M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    # ----- API proxy -----
    location /api/ {
        proxy_pass http://alucurv_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://alucurv_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ----- Next.js static assets -----
    location /_next/static/ {
        proxy_pass http://alucurv_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* ^/(logo\.svg|icon\.svg|favicon\.ico|robots\.txt) {
        proxy_pass http://alucurv_web;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1d;
    }

    # ----- Web (everything else) -----
    location / {
        proxy_pass http://alucurv_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Upgrade           $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
